# Multi-language benchmark fixtures for the Qartez MCP harness.
#
# Each section below pins an open-source repository at a specific commit.
# `scripts/setup-benchmark-fixtures.sh` reads this file and clones each entry
# into `target/benchmark-fixtures/<lang>/` (shallow, blobless) and checks out
# the pinned commit. The fixture is then indexed with qartez-mcp so the
# benchmark harness can point `--project-root` at it.
#
# Pinning is intentional: benchmark numbers are only comparable across runs
# when the source under test is byte-identical. To move to a newer commit,
# bump the `commit` field here and re-run the setup script. Treat any bump
# as a baseline refresh - call it out in the commit message.
#
# If a pinned commit becomes unreachable (e.g. force-push removes it), pick
# another commit from roughly mid-2025 for the same repo and record why in
# the commit that updates this file.

[typescript]
repo = "https://github.com/colinhacks/zod.git"
commit = "499df780b10dfcce29afba3e811757f7eade9570"
committed_at = "2025-07-11"
description = "Schema validation library, ~313 .ts files, pnpm workspace under packages/"

[python]
repo = "https://github.com/encode/httpx.git"
commit = "4fb9528c2f5ac000441c3634d297e77da23067cd"
committed_at = "2025-06-27"
description = "Async HTTP client, ~60 .py files, flat httpx/ package + tests/"

[go]
repo = "https://github.com/spf13/cobra.git"
commit = "6dec1ae26659a130bdb4c985768d1853b0e1bc06"
committed_at = "2025-05-31"
description = "CLI framework, ~36 .go files, flat layout with cobra.go at repo root"

[java]
