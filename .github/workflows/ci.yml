name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / stable
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable @ 2026-03-27
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo registry / git / target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: cargo fmt --check
        if: runner.os == 'Linux'
        run: cargo fmt --all -- --check

      - name: cargo clippy
        if: runner.os == 'Linux'
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: cargo build --release
        run: cargo build --locked --release

      - name: cargo test --release --no-fail-fast
        run: cargo test --locked --release --no-fail-fast

      - name: POSIX installer portability checks
        if: runner.os != 'Windows'
        run: bash ./tests/test-install.sh

      - name: Windows installer dry-run checks
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./tests/test-install.ps1

  msrv:
    name: MSRV (1.88) / ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable @ 2026-03-27
        with:
          toolchain: "1.88"

      - name: Cache cargo registry / git / target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: cargo build --release
        run: cargo build --locked --release

      - name: cargo test --release --no-fail-fast
        run: cargo test --locked --release --no-fail-fast
