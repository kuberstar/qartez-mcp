name: CI

on:
  push:
    # `release/*` is required for the branch-first release gate in
    # scripts/release.sh: the release commit is pushed to a
    # `release/vX.Y.Z` branch and the script waits for this CI run to
    # go green before tagging `main`. Without the glob, CI skips the
    # branch push and the script times out waiting for a run that
    # never started.
    branches: [main, 'release/*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / stable
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Harden runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable @ 2026-03-27
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo registry / git / target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      # Node + pnpm are required so the qartez-dashboard build script can
      # compile the SvelteKit bundle that is rust-embedded into the binary.
      # Without `web/build/` populated, the `RustEmbed` derive on `embed::Web`
      # produces a struct with no `get` method and clippy fails to compile.
      - name: Setup Node.js (for dashboard frontend build)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'

      - name: Install pnpm
        shell: bash
        run: npm install -g pnpm@10.33.0

      - name: cargo fmt --check
        if: runner.os == 'Linux'
        run: cargo fmt --all -- --check

      # Default-features clippy is the release gate. It exercises every
      # code path shipped in the user-installable binary (no `semantic`,
      # no `benchmark`) and does not touch external CDN-hosted build
      # dependencies, so CDN outages never red-tag a release.
      - name: cargo clippy (default features)
        if: runner.os == 'Linux'
        shell: bash
        run: cargo clippy --locked --all-targets -- -D warnings

      # `--features semantic` pulls `ort-sys`, whose build script
      # downloads prebuilt ONNX Runtime binaries from `cdn.pyke.io`. An
      # HTTP 5xx on that CDN (seen on v0.9.4 / v0.9.5 ubuntu-stable
      # jobs) is unrelated to the code under test. This step is allowed
      # to fail so a CDN outage cannot block the release, but the retry
      # wrapper gives the CDN three chances before giving up. Real lint
      # regressions in the `semantic` code path still surface because
      # `ci-retry.sh` only retries on network-shaped failures.
      - name: cargo clippy (semantic - continue on CDN outage)
        if: runner.os == 'Linux'
        shell: bash
        continue-on-error: true
        run: ./scripts/ci-retry.sh cargo clippy --locked --all-targets --features semantic,benchmark -- -D warnings

      - name: cargo build --release
        shell: bash
        run: cargo build --locked --release

      - name: cargo test --release --no-fail-fast
        shell: bash
        run: cargo test --locked --release --no-fail-fast

      - name: cargo doc (default features, warnings as errors)
        if: runner.os == 'Linux'
        shell: bash
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --locked --no-deps

      - name: cargo doc (semantic - continue on CDN outage)
        if: runner.os == 'Linux'
        shell: bash
        continue-on-error: true
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: ./scripts/ci-retry.sh cargo doc --locked --no-deps --all-features

      - name: POSIX installer portability checks
        if: runner.os != 'Windows'
        run: bash ./tests/test-install.sh

      - name: Windows installer dry-run checks
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./tests/test-install.ps1

  msrv:
    name: MSRV (1.88) / ubuntu-latest
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable @ 2026-03-27
        with:
          toolchain: "1.88"

      - name: Cache cargo registry / git / target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Setup Node.js (for dashboard frontend build)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@10.33.0

      - name: cargo build --release
        run: cargo build --locked --release

      - name: cargo test --release --no-fail-fast
        run: cargo test --locked --release --no-fail-fast
