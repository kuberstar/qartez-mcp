name: cargo-deny

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - ".github/workflows/deny.yml"
  push:
    # `release/*` mirrors the branch-first release gate in ci.yml so
    # cargo-deny failures (license, wildcards, advisories) surface on
    # the release branch BEFORE the tag is pushed. Tags themselves are
    # also covered so a manual tag push without a release branch still
    # gets gated.
    branches: [main, 'release/*']
    tags: ['v*']
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deny-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb  # v2.0.17
        with:
          command: check advisories bans licenses sources
